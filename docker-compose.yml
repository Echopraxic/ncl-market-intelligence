services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: ncl-postgres
    environment:
      POSTGRES_USER: ncl_user
      POSTGRES_PASSWORD: ncl_password
      POSTGRES_DB: ncl_mie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ncl_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ncl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
