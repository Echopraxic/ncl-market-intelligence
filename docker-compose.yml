version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ncl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ncl_user
      POSTGRES_PASSWORD: ncl_password
      POSTGRES_DB: ncl_mie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ncl_user -d ncl_mie"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ncl_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ncl_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ncl_user:ncl_password@postgres:5432/ncl_mie
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  redis_data:
